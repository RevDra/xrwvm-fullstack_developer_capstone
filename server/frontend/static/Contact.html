<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cars Dealership</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css"><!-- Replace with correct path -->
</head>
<body>
    <nav>
        <div class="navbar">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact Us</a>
        </div>
    </nav>
    <div class="container">
        <h1>Contact Us</h1>
        <div class="contact-info">
            <div class="contact-method">
                <img src="/static/contactus.png" alt="Contact Us Icon">
                <h3>Phone</h3>
                <p>+1 (800) 123-4567</p>
            </div>
            <div class="contact-method">
                <img src="/static/cars.jpeg" alt="Cars">
                <h3>Email</h3>
                <p>support@carsdealership.com</p>
            </div>
            <div class="contact-method">
                <img src="https://via.placeholder.com/100" alt="Address Icon">
                <h3>Address</h3>
                <p>123 Auto Lane, Detroit, MI 48201</p>
            </div>
        </div>
        <div class="contact-form">
            <h2>Send us a Message</h2>
            <form>
                <input type="text" placeholder="Your Name" required><br>
                <input type="email" placeholder="Your Email" required><br>
                <textarea placeholder="Your Message" required></textarea><br>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
